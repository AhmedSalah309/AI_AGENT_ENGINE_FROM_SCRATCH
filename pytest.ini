[pytest]
pythonpath = src
testpaths = tests
# Running in parallel, and calculating code coverage
addopts = -p no:xdist -s --cov=agent_engine --cov-report=term-missing --log-cli-level=INFO --log-file=logs/pytest_run.log --log-file-level=DEBUG

# Settings for logs in the terminal screen
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %H:%M:%S

# Settings for saving logs in the file (inside the logs folder)
log_file = logs/pytest_run.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
